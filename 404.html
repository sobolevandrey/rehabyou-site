<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — REHAB.YOU</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/mobile.css">
<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: var(--black);
    color: var(--white);
  }
  .error-code {
    font-family: var(--font-display);
    font-size: clamp(80px, 20vw, 200px);
    font-weight: 900;
    color: var(--orange);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .error-title {
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 700;
    text-transform: uppercase;
    margin: 16px 0 12px;
    letter-spacing: -0.02em;
  }
  .error-text {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    max-width: 400px;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .error-btn {
    display: inline-block;
    background: var(--orange);
    color: var(--black);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 16px 40px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .error-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(244,153,51,0.3);
  }
</style>
</head>
<body>
<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-title">Страница не найдена</div>
  <p class="error-text">Такой страницы не существует. Возможно, она была перемещена или удалена.</p>
  <a href="/" class="error-btn">На главную</a>
</div>
</body>
</html>
